services:
  discovery-server:
    build:
      context: .
      dockerfile: infra/discovery-server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  config-server:
    build:
      context: .
      dockerfile: infra/config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  stats-db:
    image: postgres:17.7-alpine3.23
    container_name: stats-db
    environment:
      - POSTGRES_DB=stats
      - POSTGRES_USER=stats_user
      - POSTGRES_PASSWORD=secret
    volumes:
      - stats-db-data:/var/lib/postgresql/data/
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10

  ewm-db:
    image: postgres:17.7-alpine3.23
    container_name: ewm-db
    environment:
      - POSTGRES_DB=ewm
      - POSTGRES_USER=ewm_user
      - POSTGRES_PASSWORD=secret
    volumes:
      - ewm-db-data:/var/lib/postgresql/data/
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10

  stats-server:
    build:
      context: .
      dockerfile: stat/stats-server/Dockerfile
    container_name: stats-server
    ports:
      - "9090:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats
      - SPRING_DATASOURCE_USERNAME=stats_user
      - SPRING_DATASOURCE_PASSWORD=secret
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SERVER_PORT=9090
    depends_on:
      stats-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9090/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: core/user-service/Dockerfile
    container_name: user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db:5432/ewm
      - SPRING_DATASOURCE_USERNAME=ewm_user
      - SPRING_DATASOURCE_PASSWORD=secret
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SERVER_PORT=8081
    depends_on:
      ewm-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  event-service:
    build:
      context: .
      dockerfile: core/event-service/Dockerfile
    container_name: event-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db:5432/ewm
      - SPRING_DATASOURCE_USERNAME=ewm_user
      - SPRING_DATASOURCE_PASSWORD=secret
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SERVER_PORT=8082
    depends_on:
      ewm-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  request-service:
    build:
      context: .
      dockerfile: core/request-service/Dockerfile
    container_name: request-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db:5432/ewm
      - SPRING_DATASOURCE_USERNAME=ewm_user
      - SPRING_DATASOURCE_PASSWORD=secret
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SERVER_PORT=8083
    depends_on:
      ewm-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  compilation-service:
    build:
      context: .
      dockerfile: core/extra-service/Dockerfile
    container_name: compilation-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db:5432/ewm
      - SPRING_DATASOURCE_USERNAME=ewm_user
      - SPRING_DATASOURCE_PASSWORD=secret
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SERVER_PORT=8084
    depends_on:
      ewm-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  gateway-server:
    build:
      context: .
      dockerfile: infra/gateway-server/Dockerfile
    container_name: gateway-server
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - COMPILATION_SERVICE_URL=http://compilation-service:8084
    depends_on:
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      request-service:
        condition: service_healthy
      compilation-service:
        condition: service_healthy
      stats-server:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health && wget --no-verbose --tries=1 --spider http://localhost:8080/compilations || exit 1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 15

volumes:
  stats-db-data:
  ewm-db-data:
