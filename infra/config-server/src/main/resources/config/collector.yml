server:
  port: 0

spring:
  application:
    name: collector
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.LongSerializer
      value-serializer: ru.practicum.ewm.stats.avro.UserActionAvroSerializer

grpc:
  server:
    port: 0

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}
  instance:
    hostname: localhost
    prefer-ip-address: false

kafka:
  topics:
    user-actions: stats.user-actions.v1