server:
  port: 0

spring:
  application:
    name: analyzer
  kafka:
    bootstrap-servers: localhost:9092
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://analyzer-db:5432/analyzer}
    username: ${SPRING_DATASOURCE_USERNAME:analyzer_user}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}

grpc:
  server:
    port: 0

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: analyzer
